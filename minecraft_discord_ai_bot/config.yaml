name: Minecraft Discord AI Bot
version: "1.2.0"
slug: minecraft_discord_ai_bot
description: AI-powered Discord bot for safely diagnosing and fixing a Minecraft server over RCON.
url: "https://github.com/Sirgb12/bibiai-ha-addon-repository"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: false
host_network: false
map:
  - share:rw
options:
  discord_token: ""
  discord_client_id: ""
  discord_guild_id: ""
  bot_allowed_channel_ids: ""
  bot_admin_role_ids: ""
  bot_persona_style: "Formal, stern, statesmanlike server operator. Sound like a high-stakes security briefing, but do not impersonate a real person."
  bot_persona_file: "/share/bibiai_persona.txt"
  gemini_api_key: ""
  gemini_model: "gemini-3.5-flash"
  mc_server_name: "Survival"
  mc_rcon_host: "192.168.1.50"
  mc_rcon_port: 25575
  mc_rcon_password: ""
  mc_query_host: "192.168.1.50"
  mc_query_port: 25565
  mc_log_path: ""
  status_log_lines: 80
  memory_enabled: true
  memory_path: "/data/bibiai-memory.json"
  max_memory_items: 40
  max_memory_entry_length: 500
  vision_enabled: true
  max_image_bytes: 8388608
  moderation_enabled: true
  moderation_log_channel_id: ""
  moderation_min_timeout_minutes: 1
  moderation_max_timeout_minutes: 5
  moderation_rule_timeout_minutes: 5
  moderation_offense_timeout_minutes: 1
  moderation_spam_timeout_minutes: 2
  spam_bibiai_window_ms: 30000
  spam_bibiai_limit: 4
  event_log_path: "/data/bibiai-events.json"
  event_log_retention_days: 60
  event_log_max_items: 500
  mc_monitor_enabled: true
  mc_monitor_interval_minutes: 5
  mc_recovery_enabled: false
  mc_recovery_webhook_url: ""
  mc_recovery_webhook_method: "POST"
  mc_recovery_offline_checks: 2
  minecraft_report_channel_id: ""
  weekly_report_enabled: true
  weekly_report_day: "sunday"
  weekly_report_hour_utc: 18
  ai_auto_execute_safe_commands: true
  allow_stop_command: false
  bypass_rcon_safety: false
  max_commands_per_fix: 6
  rcon_timeout_ms: 5000
schema:
  discord_token: str
  discord_client_id: str
  discord_guild_id: str
  bot_allowed_channel_ids: str
  bot_admin_role_ids: str
  bot_persona_style: str
  bot_persona_file: str
  gemini_api_key: str
  gemini_model: str
  mc_server_name: str
  mc_rcon_host: str
  mc_rcon_port: int
  mc_rcon_password: str
  mc_query_host: str
  mc_query_port: int
  mc_log_path: str
  status_log_lines: int
  memory_enabled: bool
  memory_path: str
  max_memory_items: int
  max_memory_entry_length: int
  vision_enabled: bool
  max_image_bytes: int
  moderation_enabled: bool
  moderation_log_channel_id: str
  moderation_min_timeout_minutes: int
  moderation_max_timeout_minutes: int
  moderation_rule_timeout_minutes: int
  moderation_offense_timeout_minutes: int
  moderation_spam_timeout_minutes: int
  spam_bibiai_window_ms: int
  spam_bibiai_limit: int
  event_log_path: str
  event_log_retention_days: int
  event_log_max_items: int
  mc_monitor_enabled: bool
  mc_monitor_interval_minutes: int
  mc_recovery_enabled: bool
  mc_recovery_webhook_url: str
  mc_recovery_webhook_method: list(POST|GET)
  mc_recovery_offline_checks: int
  minecraft_report_channel_id: str
  weekly_report_enabled: bool
  weekly_report_day: list(sunday|monday|tuesday|wednesday|thursday|friday|saturday)
  weekly_report_hour_utc: int
  ai_auto_execute_safe_commands: bool
  allow_stop_command: bool
  bypass_rcon_safety: bool
  max_commands_per_fix: int
  rcon_timeout_ms: int
