name: Minecraft Discord AI Bot
version: "1.3.5"
slug: minecraft_discord_ai_bot
description: AI-powered Discord bot for safely diagnosing and fixing a Minecraft server over RCON.
url: "https://github.com/Sirgb12/bibiai-ha-addon-repository"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: false
host_network: false
map:
  - share:rw
options:
  discord_token: ""
  discord_client_id: ""
  discord_guild_id: ""
  bot_allowed_channel_ids: ""
  bot_admin_role_ids: ""
  bot_persona_style: "Formal, stern, statesmanlike server operator. Sound like a high-stakes security briefing, but do not impersonate a real person."
  bot_persona_file: "/share/bibiai_persona.txt"
  sholom_enabled: true
  sholom_trigger: "sholom"
  sholom_audio_path: "/share/bibiai_sholom.mp3"
  sholom_cooldown_seconds: 120
  sholom_leave_after_seconds: 10
  sholom_random_enabled: false
  sholom_random_min_minutes: 30
  sholom_random_max_minutes: 180
  gemini_api_key: ""
  gemini_model: "gemini-3.5-flash"
  mc_server_name: "Survival"
  mc_rcon_host: "192.168.1.50"
  mc_rcon_port: 25575
  mc_rcon_password: ""
  mc_query_host: "192.168.1.50"
  mc_query_port: 25565
  mc_log_path: ""
  status_log_lines: 80
  memory_enabled: true
  memory_path: "/data/bibiai-memory.json"
  max_memory_items: 40
  max_memory_entry_length: 500
  conversation_memory_enabled: true
  conversation_memory_path: "/data/bibiai-conversations.json"
  conversation_memory_max_turns: 1000
  conversation_memory_recent_turns: 12
  conversation_memory_relevant_turns: 12
  conversation_memory_max_entry_length: 2000
  conversation_memory_max_prompt_chars: 6000
  chat_observe_enabled: true
  chat_observe_min_message_length: 3
  chat_chime_enabled: false
  chat_chime_probability: 0.06
  chat_chime_cooldown_minutes: 45
  chat_chime_min_message_length: 12
  chat_revive_enabled: false
  chat_revive_channel_id: ""
  chat_revive_idle_minutes: 240
  chat_revive_cooldown_minutes: 720
  chat_revive_check_interval_minutes: 30
  chat_revive_use_everyone: true
  chat_revive_message: "The Honda Fit Republic requests signs of life. What is everyone building, plotting, or blaming on hummingbirds today?"
  grudge_enabled: true
  grudge_path: "/data/bibiai-grudges.json"
  grudge_retaliation_enabled: true
  grudge_retaliation_cooldown_minutes: 10
  grudge_max_entries: 500
  grudge_max_prompt_chars: 1200
  vision_enabled: true
  max_image_bytes: 8388608
  max_video_bytes: 20971520
  snitching_enabled: true
  snitch_channel_id: ""
  snitch_allow_user_reports: true
  snitch_report_moderation_events: true
  snitch_auto_punish_enabled: true
  snitch_min_timeout_minutes: 1
  snitch_timeout_minutes: 3
  snitch_max_timeout_minutes: 5
  snitch_cooldown_seconds: 300
  snitch_escalate_repeat_reports: true
  snitch_repeat_lookback_days: 7
  moderation_enabled: true
  moderation_log_channel_id: ""
  moderation_min_timeout_minutes: 1
  moderation_max_timeout_minutes: 5
  moderation_rule_timeout_minutes: 5
  moderation_offense_timeout_minutes: 1
  moderation_spam_timeout_minutes: 2
  spam_bibiai_window_ms: 30000
  spam_bibiai_limit: 4
  event_log_path: "/data/bibiai-events.json"
  event_log_retention_days: 60
  event_log_max_items: 500
  mc_monitor_enabled: true
  mc_monitor_interval_minutes: 5
  mc_recovery_enabled: false
  mc_recovery_webhook_url: ""
  mc_recovery_webhook_method: "POST"
  mc_recovery_offline_checks: 2
  pebblehost_api_enabled: false
  pebblehost_api_token: ""
  pebblehost_server_id: ""
  pebblehost_recovery_signal: "start"
  pebblehost_api_base_url: "https://panel.pebblehost.com"
  join_server_address: "54.39.123.115:25579"
  join_modpack_name: "Honda Fit SMP modpack"
  join_modpack_url: ""
  join_modrinth_modpack_url: "https://drive.google.com/file/d/1n0NX1gIwkfNeogzVpRjRp1naetc_Rsl7/view?usp=sharing"
  join_curseforge_modpack_url: "https://drive.google.com/file/d/1n7ywFxEVsAgdPUDFNg4V9G9GYem-6jxd/view?usp=drive_link"
  join_modpack_loader: "CurseForge and Modrinth"
  join_minecraft_version: ""
  join_install_guide_url: ""
  join_help_channel_id: ""
  join_extra_notes: "CurseForge players must also download the Origins Legacy Classes mod from Modrinth's website and drag it into the pack's mods folder."
  join_auto_reply_enabled: true
  vacation_mode_enabled: false
  vacation_return_date: ""
  vacation_report_channel_id: ""
  vacation_daily_report_enabled: true
  vacation_report_hour_utc: 18
  vacation_auto_reply_enabled: true
  vacation_owner_note: "Ben is away for about a week. BibiAI is covering basic server help and routine moderation."
  vacation_rules_summary: "No edating, no porn/NSFW, no spamming BibiAI, keep chat civil, and use /join for setup help."
  vacation_full_moderation_enabled: true
  vacation_delete_rulebreaking_messages: true
  vacation_timeout_low_minutes: 5
  vacation_timeout_medium_minutes: 30
  vacation_timeout_high_minutes: 360
  vacation_timeout_critical_minutes: 1440
  vacation_max_timeout_minutes: 1440
  vacation_escalate_repeat_offenses: true
  vacation_repeat_lookback_days: 7
  vacation_rapid_spam_window_ms: 15000
  vacation_rapid_spam_limit: 8
  vacation_duplicate_spam_limit: 4
  vacation_blocked_terms: ""
  minecraft_report_channel_id: ""
  weekly_report_enabled: true
  weekly_report_day: "sunday"
  weekly_report_hour_utc: 18
  ai_auto_execute_safe_commands: true
  allow_stop_command: false
  bypass_rcon_safety: false
  max_commands_per_fix: 6
  rcon_timeout_ms: 5000
